<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The EDGEx — Reset Password</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%231a1a2e'/><text x='16' y='23' font-size='20' text-anchor='middle' font-family='sans-serif' font-weight='bold' fill='white'>E</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; height: 100%; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0b0c1e;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 18% 18%, rgba(79,70,229,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 55% 45% at 82% 80%, rgba(5,150,105,0.14) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 0;
}

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 60px rgba(79,70,229,0.08);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-title {
  font-weight: 900;
  font-size: 36px;
  letter-spacing: -1.5px;
  line-height: 1;
  text-transform: uppercase;
}

.logo-title .x-letter { color: #7c6ff7; font-style: italic; }

.logo-sub {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-top: 10px;
}

.icon {
  font-size: 40px;
  text-align: center;
  margin-bottom: 16px;
}

.info-text {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 16px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 13px 44px 13px 16px;
  font-size: 15px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}

.form-group input:focus {
  border-color: rgba(124,111,247,0.6);
  background: rgba(255,255,255,0.08);
}

.form-group input::placeholder { color: rgba(255,255,255,0.25); }

.toggle-pw {
  position: absolute;
  right: 14px;
  bottom: 14px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  line-height: 1;
}
.toggle-pw:hover { color: rgba(255,255,255,0.7); }

.strength-bar-wrap {
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.strength-bar {
  height: 3px;
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s, background 0.3s;
}

.strength-label {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 5px;
  height: 14px;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: #7c6ff7;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s, transform 0.15s;
  font-family: 'Inter', sans-serif;
}

.btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.error-msg {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #f87171;
  margin-top: 14px;
  display: none;
  text-align: center;
}

.success-msg {
  background: rgba(52,211,153,0.12);
  border: 1px solid rgba(52,211,153,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #34d399;
  margin-top: 14px;
  display: none;
  text-align: center;
}

/* Invalid link state */
.invalid-state { display: none; text-align: center; }
.invalid-state .icon { font-size: 48px; margin-bottom: 16px; }
.invalid-state p { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.6; }
.invalid-state a {
  display: inline-block;
  margin-top: 20px;
  color: #7c6ff7;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-title">THE EDGE<span class="x-letter">x</span></div>
    <div class="logo-sub">Set New Password</div>
  </div>

  <!-- Valid token: show form -->
  <div id="formState">
    <div class="icon">🔑</div>
    <p class="info-text">Choose a strong password for your EDGEx account.</p>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="pw1" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength()"/>
      <button class="toggle-pw" type="button" onclick="togglePw('pw1', this)">👁</button>
      <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="pw2" placeholder="Re-enter password" autocomplete="new-password"/>
      <button class="toggle-pw" type="button" onclick="togglePw('pw2', this)">👁</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="doReset()">Set Password</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <!-- Invalid / expired token -->
  <div class="invalid-state" id="invalidState">
    <div class="icon">⚠️</div>
    <p>This password reset link is invalid or has expired.<br>Please request a new one from the Supabase dashboard.</p>
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<script>
const SB_URL  = 'https://mdkyijbgvxedelcqcouu.supabase.co';
const SB_ANON = 'sb_publishable_K48G2cqwoLi46Y51TJHj-Q_00KgxXsC';

// ── Extract token from URL hash ──────────────────────────────────
let accessToken = null;

(function parseHash() {
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  const type  = params.get('type');
  const token = params.get('access_token');

  if (type === 'recovery' && token) {
    accessToken = token;
  } else {
    // No valid recovery token — show invalid state
    document.getElementById('formState').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }
})();

// ── Password strength ────────────────────────────────────────────
function checkStrength() {
  const pw  = document.getElementById('pw1').value;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');

  if (!pw) { bar.style.width = '0%'; lbl.textContent = ''; return; }

  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { pct: '20%', color: '#ef4444', label: 'Very weak' },
    { pct: '40%', color: '#f97316', label: 'Weak' },
    { pct: '60%', color: '#eab308', label: 'Fair' },
    { pct: '80%', color: '#22c55e', label: 'Strong' },
    { pct: '100%', color: '#34d399', label: 'Very strong' },
  ];

  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  bar.style.width    = lvl.pct;
  bar.style.background = lvl.color;
  lbl.textContent    = lvl.label;
  lbl.style.color    = lvl.color;
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

// ── Submit ───────────────────────────────────────────────────────
async function doReset() {
  const pw1   = document.getElementById('pw1').value;
  const pw2   = document.getElementById('pw2').value;
  const btn   = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const sucEl = document.getElementById('successMsg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (pw1.length < 8)  { showError('Password must be at least 8 characters.'); return; }
  if (pw1 !== pw2)     { showError('Passwords do not match.'); return; }
  if (!accessToken)    { showError('Invalid reset token. Please request a new link.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': SB_ANON,
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password: pw1 }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.msg || data.error_description || 'Could not update password. Try again.');
      btn.disabled = false;
      btn.textContent = 'Set Password';
      return;
    }

    sucEl.textContent = 'Password set! Redirecting to login...';
    sucEl.style.display = 'block';
    localStorage.removeItem('sb_session');
    setTimeout(() => { window.location.href = 'login.html'; }, 2000);

  } catch(e) {
    showError('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Set Password';
  }
}

document.getElementById('pw2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
