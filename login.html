<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The EDGEx — Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='10' fill='%231a1a2e'/><text x='16' y='23' font-size='20' text-anchor='middle' font-family='sans-serif' font-weight='bold' fill='white'>E</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; height: 100%; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0b0c1e;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 18% 18%, rgba(79,70,229,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 55% 45% at 82% 80%, rgba(5,150,105,0.14) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 0;
}

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 60px rgba(79,70,229,0.08);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-title {
  font-weight: 900;
  font-size: 36px;
  letter-spacing: -1.5px;
  line-height: 1;
  text-transform: uppercase;
}

.logo-title .x-letter { color: #7c6ff7; font-style: italic; }

.logo-sub {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-top: 10px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 15px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}

.form-group input:focus {
  border-color: rgba(124,111,247,0.6);
  background: rgba(255,255,255,0.08);
}

.form-group input::placeholder { color: rgba(255,255,255,0.25); }

.btn-login {
  width: 100%;
  padding: 14px;
  background: #7c6ff7;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s, transform 0.15s;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.01em;
}

.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.error-msg {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #f87171;
  margin-top: 14px;
  display: none;
}

.footer-note {
  text-align: center;
  margin-top: 28px;
  font-size: 11px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-title">THE EDGE<span class="x-letter">x</span></div>
    <div class="logo-sub">Sign in to continue</div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="footer-note">theedgex.com &nbsp;·&nbsp; personal operating system</div>

<script>
const SB_URL  = 'https://kthpsnaxkzmxjgbmychn.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0aHBzbmF4a3pteGpnYm15Y2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTQ2MDMsImV4cCI6MjA4NzY5MDYwM30.Gz0bppkjT3GXgSVRGhXRtkUPXRiQ-U2skWcN2aTEyRI';

// If already logged in, skip to index
async function checkExistingSession() {
  const stored = localStorage.getItem('sb_session');
  if (!stored) return;
  try {
    const session = JSON.parse(stored);
    if (session.access_token && session.expires_at > Math.floor(Date.now() / 1000)) {
      window.location.href = 'index.html';
    }
  } catch(e) {}
}
checkExistingSession();

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');

  errEl.style.display = 'none';
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'apikey': SB_ANON,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error_description || data.msg || 'Invalid email or password.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    // Store session
    localStorage.setItem('sb_session', JSON.stringify({
      access_token:  data.access_token,
      refresh_token: data.refresh_token,
      expires_at:    Math.floor(Date.now() / 1000) + data.expires_in,
      user:          data.user,
    }));

    window.location.href = 'index.html';

  } catch(e) {
    showError('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
